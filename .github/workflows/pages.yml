name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Try enabling Pages with branch source (main / root)
        id: legacy
        continue-on-error: true
        run: |
          status=$(curl -s -o resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"main","path":"/"}}')
          cat resp.json
          echo "HTTP status: $status"
          if [ "$status" = "201" ]; then
            echo "enabled=legacy" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Pages (enable via Actions if needed)
        if: steps.legacy.outputs.enabled != 'legacy'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        if: steps.legacy.outputs.enabled != 'legacy'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.legacy.outputs.enabled != 'legacy'
        id: deployment
        uses: actions/deploy-pages@v4
