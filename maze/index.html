<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BASIC / 3D MAZE — SOLID BLOCK BUILD</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app">
    <canvas id="renderCanvas" tabindex="0" aria-label="3D迷路"></canvas>

    <header class="hud hud-top-left">
      <div class="brand">BASIC / <span>3D MAZE</span></div>
      <div class="stats">
        <span>LEVEL <b id="levelValue">1</b></span>
        <span>SIZE <b id="sizeValue">7×7</b></span>
        <span>STEP <b id="stepValue">0</b></span>
        <span>TIME <b id="timeValue">00:00.0</b></span>
      </div>
    </header>

    <div id="crosshair" aria-hidden="true"></div>

    <section class="hud controls" aria-label="操作説明">
      <div><kbd>W</kbd><kbd>↑</kbd><span>前進</span></div>
      <div><kbd>S</kbd><kbd>↓</kbd><span>あとずさり</span></div>
      <div><kbd>A</kbd><kbd>←</kbd><span>左90°</span></div>
      <div><kbd>D</kbd><kbd>→</kbd><span>右90°</span></div>
      <div><kbd>SPACE</kbd><kbd>M</kbd><span>MAP</span></div>
    </section>

    <button id="panelToggle" class="panel-toggle" type="button" aria-expanded="true">LOOK</button>

    <aside id="lookPanel" class="look-panel" aria-label="リアルタイム見栄え調整">
      <div class="panel-header">
        <div>
          <p class="eyebrow">REALTIME TUNING</p>
          <h1>LOOK DEV PANEL</h1>
        </div>
        <button id="closePanel" type="button" aria-label="パネルを閉じる">×</button>
      </div>

      <div class="panel-scroll">
        <section class="panel-section">
          <h2>Maze</h2>
          <label class="select-row">Size
            <select id="mazeSize">
              <option value="7">7 × 7</option>
              <option value="9">9 × 9</option>
              <option value="11">11 × 11</option>
              <option value="13">13 × 13</option>
              <option value="15">15 × 15</option>
            </select>
          </label>
          <label class="text-row">Seed
            <input id="mazeSeed" type="number" min="1" step="1" />
          </label>
          <button id="regenerateButton" class="primary" type="button">REGENERATE</button>
        </section>

        <section class="panel-section" id="tuningControls"></section>

        <section class="panel-section">
          <h2>Colors</h2>
          <label class="color-row">Wall tint <input id="wallColor" type="color" /></label>
          <label class="color-row">Floor tint <input id="floorColor" type="color" /></label>
          <label class="color-row">LED color <input id="ledColor" type="color" /></label>
          <label class="color-row">Goal color <input id="goalColor" type="color" /></label>
        </section>

        <section class="panel-section export-grid">
          <h2>Export</h2>
          <button id="copyProfileButton" type="button">COPY LOOK JSON</button>
          <button id="downloadProfileButton" type="button">DOWNLOAD LOOK</button>
          <button id="downloadMazeButton" type="button">DOWNLOAD MAZE</button>
          <button id="resetLookButton" type="button">RESET LOOK</button>
        </section>
      </div>
    </aside>

    <section id="mapOverlay" class="map-overlay" hidden>
      <div class="map-card">
        <div class="map-title">MAP / SPACE TO CLOSE</div>
        <canvas id="mapCanvas" width="520" height="520"></canvas>
      </div>
    </section>

    <section id="messageOverlay" class="message-overlay" hidden>
      <div class="message-card">
        <p id="messageKicker">LEVEL COMPLETE</p>
        <h2 id="messageTitle">NEXT!</h2>
        <p id="messageBody"></p>
        <button id="nextButton" class="primary" type="button">NEXT LEVEL</button>
      </div>
    </section>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="app.js?v=solid-block-v3"></script>
</body>
</html>
